[project]
name = "dumbfi"
version = "0.1.0"
description = "Add your description here"
dependencies = [
]
readme = "README.md"
requires-python = ">= 3.12"

[build-system]
requires = ["maturin>=1.2,<2.0"]
build-backend = "maturin"

[tool.rye]
managed = true
dev-dependencies = [
    "pytest>=8.2.2",
]

[tool.maturin]
python-source = "python"
module-name = "dumbfi._lowlevel"
features = ["pyo3/extension-module"]
